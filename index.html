<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>画像編集アプリ</title>
    <link rel="icon" type="image/png" href="assets/images/icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <input type="checkbox" id="menu-toggle" hidden>
    <header class="site-header">
        <a href="index.html" class="logo-link">
            <img src="assets/images/logo.png" class="logo">
            <h1 class="site-title">画像編集アプリ</h1>
        </a>
        <div class="menu-wrapper">
            <label class="menu-icon" for="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </label>
        </div>
    </header>

    <nav class="side-menu" id="sideMenu">
        <p>ようこそ</p>
    </nav>

    <label for="menu-toggle" class="overlay"></label>
    <main class="main">
        <div class="edit">
            <h2>画像を編集</h2>
            <div class="select-file">
                <label class="file-upload">
                    ファイルを選択
                    <input type="file" id="upload">
                </label>                
            </div>


            <canvas id="canvas"></canvas>

            <h3>トリミング</h3>
            <div class="control">
                <div class="control-header">
                    <h4>✂️ トリミング</h4>
                </div>
                <div class="control-body-wrapper">
                    <div class="trimming-body">
                        <div class="trimming-section">
                            <div class="crop-buttons">
                                <button onclick="startCrop()">選択開始</button>
                                <button onclick="crop()">切り抜き</button>
                                <button onclick="cancelCrop()">キャンセル</button>
                            </div>
                            <p class="crop-info">画像上をドラッグして範囲を選択してください</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <h3>フィルター</h3>
            <div class="filter">
                <div class="control">
                    <div class="control-header">
                        <h4>明るさ</h4>
                    </div>
                    <div class="control-body-wrapper">
                        <div class="control-body">
                            <div class="control-section">
                                <input type="range" id="brightness" min="-100" max="100" value="0">
                                <span id="bVal">0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="control">
                    <div class="control-header">
                        <h4>コントラスト</h4>
                    </div>
                    <div class="control-body-wrapper">
                        <div class="control-body">
                            <div class="control-section">
                                <input type="range" id="contrast" min="-100" max="100" value="0">
                                <span id="cVal">0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="control">
                    <div class="control-header">
                        <h4>彩度</h4>
                    </div>
                    <div class="control-body-wrapper">
                        <div class="control-body">
                            <div class="control-section">
                                <input type="range" id="saturation" min="0" max="200" value="100">
                                <span id="sVal">100</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="control">
                    <div class="control-header">
                        <h4>ぼかし</h4>
                    </div>
                    <div class="control-body-wrapper">
                        <div class="control-body">
                            <div class="control-section">
                                <input type="range" id="blur" min="0" max="10" value="0">
                                <span id="blurVal">0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <button class="brightness-contrast-button" onclick="resetFilters()">フィルターをリセット</button>

            <div class="edit-buttons">
                <div class="edit-execution-button">
                    <ul><button class="push-btn" onclick="grayscale()">グレースケール</button></ul>
                </div>
                <div class="edit-reset-button">
                    <ul><button class="push-btn" onclick="resetImage()">リセット</button></ul>
                </div>
                <div class="edit-download-button">
                    <ul><button onclick="downloadImage()">ダウンロード</button></ul>
                </div>
            </div>
        </div>

    </main>
    <footer>
        <div class="footer-upper">
            <div class="footer-upper-logo">
                <a href="index.html" class="footer-logo-link">
                    <img src="assets/images/logo.png" class="footer-logo">
                    <h1 class="footer-title">画像編集アプリ</h1>
                </a>
            </div>
            <div class="footer-upper-nav">
                <div class="footer-upper-nav-clm">
                    <p>1</p>
                </div>
                <div class="footer-upper-nav-clm">
                    <p>2</p>
                </div>
            </div>
        </div>
        <div class="footer-lower">
            <div class="footer-container">
                <p class="copyright">
                    <small>
                        Copyright©2026 M.H.
                        <br>
                        All Rights Reserved.
                    </small>
                </p>
            </div>
        </div>
    </footer>
    <script src="js/script.js"></script>
</body>

</html>
